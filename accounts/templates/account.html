{% extends 'base.html' %}

{% block title %}Аккаунт{% endblock %}

{% block link %}{% endblock %}

{% block content %}
<p>Имя пользователя: {{ username }}</p>
{% if email %}
<p>Email: {{ email }}</p>
{% else %}
<p>Email: данные не указаны</p>
{% endif %}
<img src="{{ avatar.url }}" style="width: 200px; height: 200px;">
<p><a href="{% url 'create_posting' %}">Создать объявление</a></p>
<form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">Выйти из аккаунта</button>
</form>

{% endblock %}
