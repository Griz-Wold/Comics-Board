{% extends 'base.html' %}

{% block title %}Создать объявление{% endblock %}

{% block link %}{% endblock %}

{% block content %}

<form method="post">
    {% csrf_token %}
    <h2>Создание нового объявления</h2>
    <p>Укажите название: {{ form.title }}</p>
    <p>Добавьте описание: {{ form.description }}</p>
    <p>Укажите цену: {{ form.price }}</p>
    <button type="submit">Разместить объявление</button>
</form>

{% endblock %}
