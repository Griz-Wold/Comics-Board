{% extends 'base.html' %}

{% block title %}{{ posting.title }}{% endblock %}

{% block content %}

<div class="row px-4">
    <div class="row mb-2"><h2 class="text-uppercase">{{ posting.title }}</h2></div>
    <div class="row-sm mb-2"><img src="{{ posting.image.url }}" style="height: 300px;"></div>
    <div class="row mb-2"><h4>{{ posting.description }}</h4></div>
    <div class="row mb-2"><h4>Цена: {{ posting.price }} ₽</h4></div>
    {% if request.user == posting.account %}
    <div class="row-sm mb-2"><a href="{% url 'edit_posting' posting.id %}" class="btn btn-success">Редактировать объявление</a></div>
    <div class="row-sm mb-2"><a href="{% url 'delete_posting' posting.id %}" class="btn btn-danger">Удалить объявление</a></div>
    {% endif %}
</div>

{% endblock %}
